name: E2E Full

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override BASE_URL (leave blank to spin up docker compose)"
        required: false
        default: ""

concurrency:
  group: e2e-full-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e-full:
    name: E2E full / ${{ matrix.project }} shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        project: [public, admin-auth, admin-crud, cross]
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nihomeweb/package-lock.json

      - name: Install frontend deps
        working-directory: nihomeweb
        run: npm ci

      - name: Install Playwright browsers
        working-directory: nihomeweb
        run: npx playwright install --with-deps chromium

      - name: Start full stack (if no BASE_URL provided)
        if: ${{ github.event.inputs.base_url == '' }}
        run: docker compose up -d --build

      - name: Wait for backend readiness
        if: ${{ github.event.inputs.base_url == '' }}
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5043/api/projects > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 5
          done
          docker compose logs --tail=300
          exit 1

      - name: Run Playwright full suite (sharded)
        working-directory: nihomeweb
        env:
          BASE_URL: ${{ github.event.inputs.base_url != '' && github.event.inputs.base_url || 'http://localhost:5043' }}
          PLAYWRIGHT_SUITE: full
        run: npx playwright test --project=${{ matrix.project }} --shard=${{ matrix.shard }}/2

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-${{ matrix.project }}-shard-${{ matrix.shard }}
          path: |
            nihomeweb/playwright-report
            nihomeweb/test-results
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure() && github.event.inputs.base_url == ''
        run: docker compose logs --tail=500

      - name: Tear down stack
        if: always() && github.event.inputs.base_url == ''
        run: docker compose down -v

  notify-on-failure:
    name: Open issue on nightly failure
    needs: e2e-full
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly E2E failed on ${new Date().toISOString().slice(0, 10)}`;
            const body = `The nightly full E2E run failed.\n\nRun: ${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["e2e", "ci-failure"],
            });
