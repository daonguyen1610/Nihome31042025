name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nihomebackend:
    name: nihomebackend (build, test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:SkipNihomeWebBuild=true -p:TreatWarningsAsErrors=true

      - name: Lint (dotnet format)
        run: dotnet format --no-restore --verify-no-changes

      - name: Test
        run: dotnet test --no-build -c Release
             --logger "trx;LogFileName=unit-results.trx"
             --logger "junit;LogFileName=unit-results.xml"
             --results-directory ../TestResults/unit
        working-directory: nihomebackend.tests

      - name: Generate HTML report
        if: always()
        run: |
          npx --yes xunit-viewer -r TestResults/unit/unit-results.xml -o TestResults/unit/unit-results.html -t "Backend unit tests"

      - name: Publish test results to PR check
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend unit tests
          path: TestResults/unit/unit-results.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-backend-results
          path: TestResults/unit
          if-no-files-found: ignore
          retention-days: 2

  nihomebackend-integration:
    name: nihomebackend (integration tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore nihomebackend.integration.tests/nihomebackend.integration.tests.csproj

      - name: Test (integration)
        run: dotnet test nihomebackend.integration.tests/nihomebackend.integration.tests.csproj
             --configuration Release
             --logger "trx;LogFileName=integration-results.trx"
             --logger "junit;LogFileName=integration-results.xml"
             --results-directory TestResults

      - name: Generate HTML report
        if: always()
        run: |
          npx --yes xunit-viewer -r TestResults/integration-results.xml -o TestResults/integration-results.html -t "Backend integration tests"

      - name: Publish test results to PR check
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend integration tests
          path: TestResults/integration-results.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-backend-results
          path: TestResults
          if-no-files-found: ignore
          retention-days: 2

  nihomeweb-lint:
    name: nihomeweb (lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nihomeweb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nihomeweb/package-lock.json
      - run: npm ci
      - run: npm run lint

  nihomeweb-build:
    name: nihomeweb (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nihomeweb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nihomeweb/package-lock.json
      - run: npm ci
      - run: npm run build

  e2e:
    name: E2E (browser + deployment smoke)
    # Pure-API behavior is covered by nihomebackend.integration.tests; this job
    # only runs the real-browser specs and deployment-only contracts (CORS etc.)
    # against the docker-compose stack.
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nihomeweb/package-lock.json

      - name: Install frontend deps
        working-directory: nihomeweb
        run: npm ci

      - name: Install Playwright browsers
        working-directory: nihomeweb
        run: npx playwright install --with-deps chromium

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for backend readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5043/api/system/health > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become ready in time"
          docker compose logs --tail=300
          exit 1

      - name: Run Playwright suite
        working-directory: nihomeweb
        env:
          BASE_URL: http://localhost:5043
        run: npx playwright test

      - name: Publish Playwright results to PR check
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E (Playwright)
          path: nihomeweb/playwright-report/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            nihomeweb/playwright-report
            nihomeweb/test-results
          if-no-files-found: ignore
          retention-days: 2

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose logs --tail=500

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Trivy filesystem scan (JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '0'
          format: json
          output: trivy-results.json

      - name: Generate Markdown report
        id: report
        run: |
          set +e
          python tools/trivy_report/trivy_report.py trivy-results.json --output trivy-report.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Publish report to job summary
        if: always()
        run: cat trivy-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment report on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- trivy-report -->';
            const body = marker + '\n' + fs.readFileSync('trivy-report.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Generate SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
      - name: Upload Trivy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: |
            trivy-report.md
            trivy-results.json
            trivy-results.sarif
          if-no-files-found: ignore
          retention-days: 2

      - name: Fail job if CRITICAL/HIGH findings exist
        if: always() && steps.report.outputs.exit_code != '0'
        run: |
          echo "::error::Trivy found CRITICAL or HIGH findings. See job summary or PR comment."
          exit 1

  publish:
    name: Publish Nicon
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nihomeweb/package-lock.json

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Run auto-deployment.sh
        run: |
          chmod +x ./auto-deployment.sh
          ./auto-deployment.sh

      - name: Compute release tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="release-$(date -u +%Y%m%d-%H%M%S)-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            deployment-config/output/publish-release.zip \
            --title "Nicon ${{ steps.tag.outputs.tag }}" \
            --notes "Automated build from ${{ github.sha }} on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
