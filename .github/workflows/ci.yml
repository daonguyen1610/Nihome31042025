name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nihomebackend:
    name: nihomebackend (build, test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:SkipNihomeWebBuild=true -p:TreatWarningsAsErrors=true

      - name: Lint (dotnet format)
        run: dotnet format --no-restore --verify-no-changes

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
        working-directory: nihomebackend.tests

  publish:
    name: Publish Nicon
    runs-on: ubuntu-latest
    needs: nihomebackend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nihomeweb/package-lock.json

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Run auto-deployment.sh
        run: |
          chmod +x ./auto-deployment.sh
          ./auto-deployment.sh

      - name: Upload publish-release.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-release
          path: deployment-config/publish-release.zip
          if-no-files-found: error
          retention-days: 30
