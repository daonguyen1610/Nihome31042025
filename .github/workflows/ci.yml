name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nihomebackend:
    name: nihomebackend (build, test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:SkipNihomeWebBuild=true -p:TreatWarningsAsErrors=true

      - name: Lint (dotnet format)
        run: dotnet format --no-restore --verify-no-changes

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
        working-directory: nihomebackend.tests
