services:
  nihomeBackend:
    build:
      context: .
      dockerfile: ./nihomebackend/Dockerfile
    image: nihome31042025-backend-dev
    container_name: nihome31042025-backend
    working_dir: /src/nihomebackend
    command:
      - dotnet
      - watch
      - --non-interactive
      - run
      - --no-launch-profile
      - --project
      - nihomebackend.csproj
      - --urls
      - http://0.0.0.0:5043
    ports:
      - "5043:5043"
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5043
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=NihomeDB;User Id=sa;Password=Nihome@31042025;TrustServerCertificate=True;
    volumes:
      - ./nihomebackend:/src/nihomebackend
      - ./nihomeweb:/src/nihomeweb
      - nihomebackend_bin:/src/nihomebackend/bin
      - nihomebackend_obj:/src/nihomebackend/obj
      - nihomeweb_node_modules:/src/nihomeweb/node_modules
      - nihomeweb_next:/src/nihomeweb/.next
      - nuget_packages:/root/.nuget/packages
    networks:
      - nihome-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: Nihome31042025-sqlserver
    environment:
      SA_PASSWORD: "Nihome@31042025"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    restart: unless-stopped
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - nihome-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep sqlservr >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  nihomeweb_node_modules:
  nihomeweb_next:
  nihomebackend_bin:
  nihomebackend_obj:
  nuget_packages:
  sqlserver_data:

networks:
  nihome-network:
    driver: bridge
