services:
  nihomeBackend:
    image: nihome31042025-backend:latest
    container_name: nihome31042025-backend
    build:
      context: .
      dockerfile: ./nihomebackend/Dockerfile
    ports:
      - "5043:5043"
    restart: always
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:5043
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=NihomeDB;User Id=sa;Password=Nihome@12092025;TrustServerCertificate=True;
    networks:
      - nihome-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: Nihome12092025-sqlserver
    environment:
      SA_PASSWORD: "Nihome@12092025"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    restart: always
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - nihome-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep sqlservr >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  sqlserver_data:

networks:
  nihome-network:
    driver: bridge
